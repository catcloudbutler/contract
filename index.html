<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>광장대리점_위탁판매계약서</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        /* 모든 요소에 box-sizing 적용하여 여백 계산 오류 방지 */
        * {
            box-sizing: border-box;
        }

        /* 기본 스타일 및 폰트 설정 */
        body {
            font-family: 'Nanum Gothic', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px; /* 모바일 기기 테두리 여백 확보 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* 세로가 짧은 모바일 화면에서 스크롤이 가능하도록 변경 */
            
            /* 보안: 텍스트 선택(드래그) 방지 */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        .container {
            background-color: #ffffff;
            padding: 50px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 520px;
            width: 100%;
            border-top: 8px solid #002060; /* 메인 색상 강조 */
        }

        h1 {
            color: #002060; /* 딥 블루 색상 */
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
        }

        /* 상단 한 줄 안내 문구 (붉은색 + 두껍게) */
        p.description {
            color: #d93025; 
            font-weight: 700; 
            font-size: 15px;
            margin-bottom: 35px;
            line-height: 1.6;
            word-break: keep-all; /* 모바일에서 자동 줄바꿈 시 단어가 깨지지 않음 */
        }

        .section-box {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 25px;
            text-align: left;
        }

        .section-title {
            font-size: 17px;
            font-weight: 700;
            color: #002060;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .section-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 16px;
            background-color: #002060;
            margin-right: 10px;
            border-radius: 2px;
        }

        .label {
            font-size: 13px;
            color: #6c757d;
            display: block;
            margin-bottom: 8px;
        }

        /* 선택박스 스타일 */
        select {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            background-color: #ffffff;
            outline: none;
            box-sizing: border-box;
            margin-bottom: 18px;
            color: #333;
            /* 모바일 브라우저 기본 화살표 스타일 유지 및 최적화 */
            -webkit-appearance: select;
            -moz-appearance: select;
            appearance: select;
        }

        select:focus {
            border-color: #002060;
            box-shadow: 0 0 0 3px rgba(0, 32, 96, 0.1);
        }

        /* 다운로드 버튼 스타일 */
        .download-btn {
            display: block;
            background-color: #002060;
            color: #ffffff;
            text-decoration: none;
            padding: 16px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 16px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            width: 100%;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* 모바일 터치 시 깜빡임 방지 */
        }

        .download-btn:hover {
            background-color: #001540;
        }

        .download-btn.secondary {
            background-color: #495057;
            margin-top: 10px;
        }

        .download-btn.secondary:hover {
            background-color: #343a40;
        }

        /* 하단 안내 문구 스타일 */
        .footer-note {
            font-size: 13px;
            color: #d93025;
            margin-top: 15px;
            font-weight: 700;
            word-break: keep-all;
        }

        /* 📱 모바일 환경(화면 가로폭 576px 이하)을 위한 맞춤 스타일 */
        @media (max-width: 576px) {
            body {
                padding: 15px;
            }
            .container {
                padding: 35px 20px; /* 내부 여백을 줄여 콘텐츠 공간 확보 */
            }
            h1 {
                font-size: 22px; /* 제목 크기 최적화 */
            }
            p.description {
                font-size: 13.5px; /* 모바일에서 가독성 좋은 크기 */
                margin-bottom: 25px;
            }
            .section-box {
                padding: 20px 15px; /* 박스 내부 여백 축소 */
                margin-bottom: 15px;
            }
            .section-title {
                font-size: 15px;
            }
            .download-btn {
                padding: 14px; /* 손가락 터치에 최적화된 컴팩트한 크기 */
                font-size: 15px;
            }
            .footer-note {
                font-size: 12px;
            }
        }
    </style>
</head>
<body oncontextmenu="return false" ondragstart="return false" onselectstart="return false">

    <div class="container">
        <h1>광장대리점_위탁판매계약서</h1>
        
        <p class="description">영업사원에게 안내 받은 금액에 따라 위탁판매계약서 다운로드하세요.</p>

        <div class="section-box">
            <div class="section-title">위탁판매계약서 다운로드</div>
            <label class="label">계약 금액 선택</label>
            <select id="amountType">
                <option value="1천만원">1천만원</option>
                <option value="2천만원">2천만원</option>
                <option value="3천만원">3천만원</option>
            </select>
            <button class="download-btn" onclick="downloadContract()">계약서 파일 받기</button>
        </div>

        <div class="section-box">
            <div class="section-title">작성 가이드 안내</div>
            <a href="./files/계약서_작성방식.pdf" download class="download-btn secondary">
                계약서 작성방식 다운로드
            </a>
            <div class="footer-note">※ 계약서 외 구비서류는 담당 영업사원에게 별도 문의</div>
        </div>
    </div>

    <script>
        function downloadContract() {
            const amount = document.getElementById('amountType').value;
            const fileName = "위탁판매계약서_" + amount + ".pdf";
            const filePath = "./files/" + fileName;

            const link = document.createElement('a');
            link.href = filePath;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 보안: 개발자 도구 및 복사 단축키 방지
        document.addEventListener('keydown', function(e) {
            if (e.keyCode === 123 || 
                (e.ctrlKey && e.shiftKey && e.keyCode === 73) || 
                (e.ctrlKey && e.keyCode === 67) || 
                (e.ctrlKey && e.keyCode === 85)) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
