<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>광장대리점_계약서</title>
    <style>
        body {
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            
            /* 텍스트 선택(드래그) 방지 CSS */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        .container {
            background-color: #ffffff;
            padding: 40px 50px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }

        h1 {
            color: #333333;
            font-size: 24px;
            margin-bottom: 10px;
        }

        p {
            color: #666666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .section-box {
            background-color: #fafbfc;
            border: 1px solid #e1e4e6;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: left;
        }

        .section-title {
            font-size: 16px;
            font-weight: bold;
            color: #222222;
            margin-bottom: 12px;
        }

        .label {
            font-size: 13px;
            color: #666666;
            display: block;
            margin-bottom: 6px;
        }

        /* 선택박스(Select) 스타일 */
        select {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            border: 1px solid #cccccc;
            border-radius: 5px;
            background-color: #ffffff;
            outline: none;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        select:focus {
            border-color: #0056b3;
        }

        /* 다운로드 버튼 스타일 */
        .download-btn {
            display: block;
            background-color: #0056b3;
            color: #ffffff;
            text-decoration: none;
            padding: 14px 20px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 15px;
            text-align: center;
            transition: background-color 0.3s ease;
            cursor: pointer;
            border: none;
            width: 100%;
            box-sizing: border-box;
        }

        .download-btn:hover {
            background-color: #004494;
        }

        /* 공통 안내 파일 버튼 스타일 (회색) */
        .download-btn.secondary {
            background-color: #6c757d;
        }

        .download-btn.secondary:hover {
            background-color: #5a6268;
        }
    </style>
</head>
<body oncontextmenu="return false" ondragstart="return false" onselectstart="return false">

    <div class="container">
        <h1>광장대리점_계약서</h1>
        <p>필요한 계약서 항목과 금액을 선택하여 다운로드하세요.</p>

        <div class="section-box">
            <div class="section-title">📄 위탁판매계약서</div>
            <label class="label" for="amountType">계약 금액을 선택해 주세요.</label>
            <select id="amountType">
                <option value="1천만원">1천만원</option>
                <option value="2천만원">2천만원</option>
                <option value="3천만원">3천만원</option>
            </select>
            <button class="download-btn" onclick="downloadContract()">위탁판매계약서 다운로드</button>
        </div>

        <div class="section-box">
            <div class="section-title">💡 안내 자료</div>
            <label class="label">계약서 작성 방법 및 주의사항입니다.</label>
            <a href="./files/계약서_작성방식.pdf" download class="download-btn secondary">
                계약서 작성방식 다운로드
            </a>
        </div>
    </div>

    <script>
        function downloadContract() {
            const amount = document.getElementById('amountType').value;
            const fileName = "위탁판매계약서_" + amount + ".pdf";
            const filePath = "./files/" + fileName;

            const link = document.createElement('a');
            link.href = filePath;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 키보드 단축키 방지 (F12 개발자 도구, Ctrl+Shift+I, Ctrl+C 복사 등) 추가 옵션
        document.addEventListener('keydown', function(event) {
            if (event.keyCode === 123 || // F12
                (event.ctrlKey && event.shiftKey && event.keyCode === 73) || // Ctrl+Shift+I
                (event.ctrlKey && event.keyCode === 67) || // Ctrl+C
                (event.ctrlKey && event.keyCode === 86) || // Ctrl+V
                (event.ctrlKey && event.keyCode === 85)) { // Ctrl+U (소스보기)
                event.preventDefault();
            }
        });
    </script>

</body>
</html>
